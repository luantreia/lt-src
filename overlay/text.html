<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Text Source</title>
  <style>
    :root {
      color-scheme: only light;

      --zocalo-left: 0px;
      --zocalo-anchor-x: 0%;
      --zocalo-shift-x: 0%;
      --zocalo-bottom: 0px;
      --zocalo-width: 1120px;
      --texto-inset-left: 180px;
      --texto-inset-right: 40px;
      --texto-inset-top: 36px;
      --texto-inset-bottom: 36px;
      --texto-align: left;
      --texto-justify: flex-start;
      --texto-size: 42px;
      --texto-font-family: "Arial Narrow", "Trebuchet MS", sans-serif;
      --texto-weight: 900;
      --texto-color: #FFFFFF;
      --texto-transform: uppercase;
      --texto-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      --texto-tracking: 0.03em;
    }

    html,
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: "Arial Narrow", "Trebuchet MS", sans-serif;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* ── Zócalo ── */
    .lower-third {
      position: absolute;
      left: var(--zocalo-anchor-x);
      bottom: var(--zocalo-bottom);
      width: var(--zocalo-width);
      opacity: 0;
      transform: translate3d(calc(var(--zocalo-shift-x) + -24px + var(--zocalo-left)), 16px, 0);
      transform-origin: left bottom;
      transition: opacity 240ms ease, transform 400ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .lower-third.visible {
      opacity: 1;
      transform: translate3d(calc(var(--zocalo-shift-x) + var(--zocalo-left)), 0, 0);
    }

    /* Imagen de fondo del zócalo.
       Reemplazá overlay/zocalo-bg.png con tu archivo. */
    .zocalo-bg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Texto superpuesto encima de la imagen */
    .texto-overlay {
      position: absolute;
      left: var(--texto-inset-left);
      right: var(--texto-inset-right);
      top: var(--texto-inset-top);
      bottom: var(--texto-inset-bottom);
      display: flex;
      flex-direction: column;
      justify-content: var(--texto-justify);
      text-align: var(--texto-align);
      color: var(--texto-color);
      font-size: var(--texto-size);
      font-family: var(--texto-font-family);
      font-weight: var(--texto-weight);
      line-height: 1.1;
      letter-spacing: var(--texto-tracking);
      text-transform: var(--texto-transform);
      text-shadow: var(--texto-shadow);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="lowerThird" class="lower-third">
      <img id="zocaloBg" class="zocalo-bg" src="/overlay/zocalo-bg.png" alt="">
      <div id="texto" class="texto-overlay"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('apiBase') || window.location.origin).replace(/\/$/, '');
    const wsBase = (params.get('wsBase') || `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`).replace(/\/$/, '');
    const HTTP_URL = `${apiBase}/state`;
    const WS_URL = wsBase;

    const lowerThird = document.getElementById('lowerThird');
    const textoNode = document.getElementById('texto');
    const zocaloBgNode = document.getElementById('zocaloBg');
    const rootStyle = document.documentElement.style;

    const defaultStyle = {
      bg: {
        bgAlignX: 'left',
        bgLeft: 0,
        bgBottom: 0,
        bgWidth: 1120,
      },
      text: {
        textInsetLeft: 180,
        textInsetRight: 40,
        textInsetTop: 36,
        textInsetBottom: 36,
        textAlignX: 'left',
        textAlignY: 'top',
        fontSize: 42,
        fontFamily: '"Arial Narrow", "Trebuchet MS", sans-serif',
        fontWeight: 900,
        textColor: '#FFFFFF',
        textUppercase: true,
      },
    };

    const state = {
      nombre: '',
      visible: true,
      zocaloVisible: true,
      zocaloStyle: defaultStyle,
      zocaloBgVersion: 0,
    };

    function refreshBackgroundImage() {
      zocaloBgNode.src = `/overlay/zocalo-bg.png?v=${state.zocaloBgVersion || 0}`;
    }

    function normalizeStyle(value) {
      const nextBg = { ...defaultStyle.bg, ...(value?.bg ?? value ?? {}) };
      const nextText = { ...defaultStyle.text, ...(value?.text ?? value ?? {}) };
      const horizontal = ['left', 'center', 'right'].includes(nextText.textAlignX) ? nextText.textAlignX : defaultStyle.text.textAlignX;
      const vertical = ['top', 'center', 'bottom'].includes(nextText.textAlignY) ? nextText.textAlignY : defaultStyle.text.textAlignY;
      return {
        bg: {
          bgAlignX: ['left', 'center', 'right'].includes(nextBg.bgAlignX) ? nextBg.bgAlignX : defaultStyle.bg.bgAlignX,
          bgLeft: Number.isFinite(Number(nextBg.bgLeft)) ? Math.max(-1920, Math.min(1920, Number(nextBg.bgLeft))) : defaultStyle.bg.bgLeft,
          bgBottom: Number.isFinite(Number(nextBg.bgBottom)) ? Math.max(0, Math.min(1080, Number(nextBg.bgBottom))) : defaultStyle.bg.bgBottom,
          bgWidth: Number.isFinite(Number(nextBg.bgWidth)) ? Math.max(200, Math.min(1920, Number(nextBg.bgWidth))) : defaultStyle.bg.bgWidth,
        },
        text: {
          textInsetLeft: Number.isFinite(Number(nextText.textInsetLeft)) ? Math.max(0, Math.min(1800, Number(nextText.textInsetLeft))) : defaultStyle.text.textInsetLeft,
          textInsetRight: Number.isFinite(Number(nextText.textInsetRight)) ? Math.max(0, Math.min(1800, Number(nextText.textInsetRight))) : defaultStyle.text.textInsetRight,
          textInsetTop: Number.isFinite(Number(nextText.textInsetTop)) ? Math.max(0, Math.min(1000, Number(nextText.textInsetTop))) : defaultStyle.text.textInsetTop,
          textInsetBottom: Number.isFinite(Number(nextText.textInsetBottom)) ? Math.max(0, Math.min(1000, Number(nextText.textInsetBottom))) : defaultStyle.text.textInsetBottom,
          textAlignX: horizontal,
          textAlignY: vertical,
          fontSize: Number.isFinite(Number(nextText.fontSize)) ? Math.max(12, Math.min(180, Number(nextText.fontSize))) : defaultStyle.text.fontSize,
          fontFamily: String(nextText.fontFamily || defaultStyle.text.fontFamily),
          fontWeight: Number.isFinite(Number(nextText.fontWeight)) ? Math.max(100, Math.min(900, Number(nextText.fontWeight))) : defaultStyle.text.fontWeight,
          textColor: /^#[0-9a-fA-F]{6}$/.test(String(nextText.textColor || '').trim()) ? String(nextText.textColor).trim().toUpperCase() : defaultStyle.text.textColor,
          textUppercase: typeof nextText.textUppercase === 'boolean' ? nextText.textUppercase : defaultStyle.text.textUppercase,
        },
      };
    }

    function applyStyle(style) {
      const normalized = normalizeStyle(style);
      const justifyMap = {
        top: 'flex-start',
        center: 'center',
        bottom: 'flex-end',
      };
      const anchorMap = {
        left: { anchor: '0%', shift: '0%' },
        center: { anchor: '50%', shift: '-50%' },
        right: { anchor: '100%', shift: '-100%' },
      };
      const bgAnchor = anchorMap[normalized.bg.bgAlignX] || anchorMap.left;
      rootStyle.setProperty('--zocalo-anchor-x', bgAnchor.anchor);
      rootStyle.setProperty('--zocalo-shift-x', bgAnchor.shift);
      rootStyle.setProperty('--zocalo-left', `${normalized.bg.bgLeft}px`);
      rootStyle.setProperty('--zocalo-bottom', `${normalized.bg.bgBottom}px`);
      rootStyle.setProperty('--zocalo-width', `${normalized.bg.bgWidth}px`);
      rootStyle.setProperty('--texto-inset-left', `${normalized.text.textInsetLeft}px`);
      rootStyle.setProperty('--texto-inset-right', `${normalized.text.textInsetRight}px`);
      rootStyle.setProperty('--texto-inset-top', `${normalized.text.textInsetTop}px`);
      rootStyle.setProperty('--texto-inset-bottom', `${normalized.text.textInsetBottom}px`);
      rootStyle.setProperty('--texto-align', normalized.text.textAlignX);
      rootStyle.setProperty('--texto-justify', justifyMap[normalized.text.textAlignY]);
      rootStyle.setProperty('--texto-size', `${normalized.text.fontSize}px`);
      rootStyle.setProperty('--texto-font-family', normalized.text.fontFamily);
      rootStyle.setProperty('--texto-weight', String(normalized.text.fontWeight));
      rootStyle.setProperty('--texto-color', normalized.text.textColor);
      rootStyle.setProperty('--texto-transform', normalized.text.textUppercase ? 'uppercase' : 'none');
      state.zocaloStyle = normalized;
    }

    function render() {
      const hasContent = Boolean(state.nombre);
      const show = state.visible && state.zocaloVisible && hasContent;
      applyStyle(state.zocaloStyle);
      textoNode.textContent = state.nombre;
      lowerThird.classList.toggle('visible', show);
    }

    async function loadInitialState() {
      try {
        const response = await fetch(HTTP_URL);
        const payload = await response.json();
        state.nombre = payload.zocalo?.nombre || '';
        state.visible = Boolean(payload.visibility?.text ?? true);
        state.zocaloVisible = Boolean(payload.visibility?.zocalo ?? true);
        state.zocaloStyle = normalizeStyle(payload.zocaloStyle);
        state.zocaloBgVersion = Number(payload.zocaloBgVersion || 0);
        refreshBackgroundImage();
        render();
      } catch (error) {
        console.error('Unable to load initial state', error);
      }
    }

    function connect() {
      const socket = new WebSocket(WS_URL);

      socket.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);

        if (message.type === 'STATE_SYNC') {
          state.nombre = message.payload.zocalo?.nombre || '';
          state.visible = Boolean(message.payload.visibility?.text ?? state.visible);
          state.zocaloVisible = Boolean(message.payload.visibility?.zocalo ?? state.zocaloVisible);
          state.zocaloStyle = normalizeStyle(message.payload.zocaloStyle);
          state.zocaloBgVersion = Number(message.payload.zocaloBgVersion || state.zocaloBgVersion || 0);
          refreshBackgroundImage();
          render();
        }

        if (message.type === 'ZOCALO') {
          state.nombre = message.payload.nombre || '';
          render();
        }

        if (message.type === 'TEXT_VISIBILITY') {
          state.visible = Boolean(message.payload.visible);
          render();
        }

        if (message.type === 'TEXT_LAYER_VISIBILITY' && message.payload.layer === 'zocalo') {
          state.zocaloVisible = Boolean(message.payload.visible);
          render();
        }

        if (message.type === 'ZOCALO_STYLE') {
          state.zocaloStyle = normalizeStyle(message.payload);
          render();
        }

        if (message.type === 'ZOCALO_BG_UPDATED') {
          state.zocaloBgVersion = Number(message.payload.version || Date.now());
          refreshBackgroundImage();
        }
      });

      socket.addEventListener('close', () => {
        setTimeout(connect, 2000);
      });
    }

    loadInitialState();
    connect();
  </script>
</body>
</html>
