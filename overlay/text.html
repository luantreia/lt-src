<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Text Source</title>
  <style>
    :root {
      color-scheme: only light;

      /* ── Posición del zócalo en el canvas 1920×1080 ── */
      --zocalo-left: 0px;
      --zocalo-bottom: 0px;

      /* ── Posición del texto dentro del zócalo ──
         Ajustá estos valores para que el texto caiga
         exactamente sobre el área de texto de tu diseño. */
      --texto-left: 180px;
      --texto-top: 36px;
      --texto-width: 900px;

      /* ── Tipografía ── */
      --texto-size: 42px;
      --texto-weight: 900;
      --texto-color: #ffffff;
      --texto-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      --texto-tracking: 0.03em;
    }

    html,
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: "Arial Narrow", "Trebuchet MS", sans-serif;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* ── Zócalo ── */
    .lower-third {
      position: absolute;
      left: var(--zocalo-left);
      bottom: var(--zocalo-bottom);
      opacity: 0;
      transform: translate3d(-24px, 16px, 0);
      transform-origin: left bottom;
      transition: opacity 240ms ease, transform 400ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .lower-third.visible {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    /* Imagen de fondo del zócalo.
       Reemplazá overlay/zocalo-bg.png con tu archivo. */
    .zocalo-bg {
      display: block;
      max-width: 100%;
    }

    /* Texto superpuesto encima de la imagen */
    .texto-overlay {
      position: absolute;
      left: var(--texto-left);
      top: var(--texto-top);
      width: var(--texto-width);
      color: var(--texto-color);
      font-size: var(--texto-size);
      font-weight: var(--texto-weight);
      line-height: 1.1;
      letter-spacing: var(--texto-tracking);
      text-transform: uppercase;
      text-shadow: var(--texto-shadow);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="lowerThird" class="lower-third">
      <img id="zocaloBg" class="zocalo-bg" src="/overlay/zocalo-bg.png" alt="">
      <div id="texto" class="texto-overlay"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('apiBase') || window.location.origin).replace(/\/$/, '');
    const wsBase = (params.get('wsBase') || `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`).replace(/\/$/, '');
    const HTTP_URL = `${apiBase}/state`;
    const WS_URL = wsBase;

    const lowerThird = document.getElementById('lowerThird');
    const textoNode = document.getElementById('texto');

    const state = {
      nombre: '',
      visible: true,
      zocaloVisible: true,
    };

    function render() {
      const hasContent = Boolean(state.nombre);
      const show = state.visible && state.zocaloVisible && hasContent;
      textoNode.textContent = state.nombre;
      lowerThird.classList.toggle('visible', show);
    }

    async function loadInitialState() {
      try {
        const response = await fetch(HTTP_URL);
        const payload = await response.json();
        state.nombre = payload.zocalo?.nombre || '';
        state.visible = Boolean(payload.visibility?.text ?? true);
        state.zocaloVisible = Boolean(payload.visibility?.zocalo ?? true);
        render();
      } catch (error) {
        console.error('Unable to load initial state', error);
      }
    }

    function connect() {
      const socket = new WebSocket(WS_URL);

      socket.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);

        if (message.type === 'STATE_SYNC') {
          state.nombre = message.payload.zocalo?.nombre || '';
          state.visible = Boolean(message.payload.visibility?.text ?? state.visible);
          state.zocaloVisible = Boolean(message.payload.visibility?.zocalo ?? state.zocaloVisible);
          render();
        }

        if (message.type === 'ZOCALO') {
          state.nombre = message.payload.nombre || '';
          render();
        }

        if (message.type === 'TEXT_VISIBILITY') {
          state.visible = Boolean(message.payload.visible);
          render();
        }

        if (message.type === 'TEXT_LAYER_VISIBILITY' && message.payload.layer === 'zocalo') {
          state.zocaloVisible = Boolean(message.payload.visible);
          render();
        }
      });

      socket.addEventListener('close', () => {
        setTimeout(connect, 2000);
      });
    }

    loadInitialState();
    connect();
  </script>
</body>
</html>
