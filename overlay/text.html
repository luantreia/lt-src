<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Text Source</title>
  <style>
    :root {
      color-scheme: only light;

      --zocalo-left: 0px;
      --zocalo-anchor-x: 0%;
      --zocalo-shift-x: 0%;
      --zocalo-bottom: 0px;
      --zocalo-width: 1120px;
      --texto-inset-left: 180px;
      --texto-inset-right: 40px;
      --texto-inset-top: 36px;
      --texto-inset-bottom: 36px;
      --texto-align: left;
      --texto-justify: flex-start;
      --texto-size: 42px;
      --texto-font-family: "Arial Narrow", "Trebuchet MS", sans-serif;
      --texto-weight: 900;
      --texto-color: #ffffff;
      --texto-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      --texto-tracking: 0.03em;
    }

    html,
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: "Arial Narrow", "Trebuchet MS", sans-serif;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* ── Zócalo ── */
    .lower-third {
      position: absolute;
      left: var(--zocalo-anchor-x);
      bottom: var(--zocalo-bottom);
      width: var(--zocalo-width);
      opacity: 0;
      transform: translate3d(calc(var(--zocalo-shift-x) + -24px + var(--zocalo-left)), 16px, 0);
      transform-origin: left bottom;
      transition: opacity 240ms ease, transform 400ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .lower-third.visible {
      opacity: 1;
      transform: translate3d(calc(var(--zocalo-shift-x) + var(--zocalo-left)), 0, 0);
    }

    /* Imagen de fondo del zócalo.
       Reemplazá overlay/zocalo-bg.png con tu archivo. */
    .zocalo-bg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Texto superpuesto encima de la imagen */
    .texto-overlay {
      position: absolute;
      left: var(--texto-inset-left);
      right: var(--texto-inset-right);
      top: var(--texto-inset-top);
      bottom: var(--texto-inset-bottom);
      display: flex;
      flex-direction: column;
      justify-content: var(--texto-justify);
      text-align: var(--texto-align);
      color: var(--texto-color);
      font-size: var(--texto-size);
      font-family: var(--texto-font-family);
      font-weight: var(--texto-weight);
      line-height: 1.1;
      letter-spacing: var(--texto-tracking);
      text-transform: uppercase;
      text-shadow: var(--texto-shadow);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="lowerThird" class="lower-third">
      <img id="zocaloBg" class="zocalo-bg" src="/overlay/zocalo-bg.png" alt="">
      <div id="texto" class="texto-overlay"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('apiBase') || window.location.origin).replace(/\/$/, '');
    const wsBase = (params.get('wsBase') || `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`).replace(/\/$/, '');
    const HTTP_URL = `${apiBase}/state`;
    const WS_URL = wsBase;

    const lowerThird = document.getElementById('lowerThird');
    const textoNode = document.getElementById('texto');
    const rootStyle = document.documentElement.style;

    const defaultStyle = {
      bgAlignX: 'left',
      bgLeft: 0,
      bgBottom: 0,
      bgWidth: 1120,
      textInsetLeft: 180,
      textInsetRight: 40,
      textInsetTop: 36,
      textInsetBottom: 36,
      textAlignX: 'left',
      textAlignY: 'top',
      fontSize: 42,
      fontFamily: '"Arial Narrow", "Trebuchet MS", sans-serif',
      fontWeight: 900,
    };

    const state = {
      nombre: '',
      visible: true,
      zocaloVisible: true,
      zocaloStyle: defaultStyle,
    };

    function normalizeStyle(value) {
      const next = { ...defaultStyle, ...(value || {}) };
      const horizontal = ['left', 'center', 'right'].includes(next.textAlignX) ? next.textAlignX : defaultStyle.textAlignX;
      const vertical = ['top', 'center', 'bottom'].includes(next.textAlignY) ? next.textAlignY : defaultStyle.textAlignY;
      return {
        bgAlignX: ['left', 'center', 'right'].includes(next.bgAlignX) ? next.bgAlignX : defaultStyle.bgAlignX,
        bgLeft: Number.isFinite(Number(next.bgLeft)) ? Math.max(-1920, Math.min(1920, Number(next.bgLeft))) : defaultStyle.bgLeft,
        bgBottom: Number.isFinite(Number(next.bgBottom)) ? Math.max(0, Math.min(1080, Number(next.bgBottom))) : defaultStyle.bgBottom,
        bgWidth: Number.isFinite(Number(next.bgWidth)) ? Math.max(200, Math.min(1920, Number(next.bgWidth))) : defaultStyle.bgWidth,
        textInsetLeft: Number.isFinite(Number(next.textInsetLeft)) ? Math.max(0, Math.min(1800, Number(next.textInsetLeft))) : defaultStyle.textInsetLeft,
        textInsetRight: Number.isFinite(Number(next.textInsetRight)) ? Math.max(0, Math.min(1800, Number(next.textInsetRight))) : defaultStyle.textInsetRight,
        textInsetTop: Number.isFinite(Number(next.textInsetTop)) ? Math.max(0, Math.min(1000, Number(next.textInsetTop))) : defaultStyle.textInsetTop,
        textInsetBottom: Number.isFinite(Number(next.textInsetBottom)) ? Math.max(0, Math.min(1000, Number(next.textInsetBottom))) : defaultStyle.textInsetBottom,
        textAlignX: horizontal,
        textAlignY: vertical,
        fontSize: Number.isFinite(Number(next.fontSize)) ? Math.max(12, Math.min(180, Number(next.fontSize))) : defaultStyle.fontSize,
        fontFamily: String(next.fontFamily || defaultStyle.fontFamily),
        fontWeight: Number.isFinite(Number(next.fontWeight)) ? Math.max(100, Math.min(900, Number(next.fontWeight))) : defaultStyle.fontWeight,
      };
    }

    function applyStyle(style) {
      const normalized = normalizeStyle(style);
      const justifyMap = {
        top: 'flex-start',
        center: 'center',
        bottom: 'flex-end',
      };
      const anchorMap = {
        left: { anchor: '0%', shift: '0%' },
        center: { anchor: '50%', shift: '-50%' },
        right: { anchor: '100%', shift: '-100%' },
      };
      const bgAnchor = anchorMap[normalized.bgAlignX] || anchorMap.left;
      rootStyle.setProperty('--zocalo-anchor-x', bgAnchor.anchor);
      rootStyle.setProperty('--zocalo-shift-x', bgAnchor.shift);
      rootStyle.setProperty('--zocalo-left', `${normalized.bgLeft}px`);
      rootStyle.setProperty('--zocalo-bottom', `${normalized.bgBottom}px`);
      rootStyle.setProperty('--zocalo-width', `${normalized.bgWidth}px`);
      rootStyle.setProperty('--texto-inset-left', `${normalized.textInsetLeft}px`);
      rootStyle.setProperty('--texto-inset-right', `${normalized.textInsetRight}px`);
      rootStyle.setProperty('--texto-inset-top', `${normalized.textInsetTop}px`);
      rootStyle.setProperty('--texto-inset-bottom', `${normalized.textInsetBottom}px`);
      rootStyle.setProperty('--texto-align', normalized.textAlignX);
      rootStyle.setProperty('--texto-justify', justifyMap[normalized.textAlignY]);
      rootStyle.setProperty('--texto-size', `${normalized.fontSize}px`);
      rootStyle.setProperty('--texto-font-family', normalized.fontFamily);
      rootStyle.setProperty('--texto-weight', String(normalized.fontWeight));
      state.zocaloStyle = normalized;
    }

    function render() {
      const hasContent = Boolean(state.nombre);
      const show = state.visible && state.zocaloVisible && hasContent;
      applyStyle(state.zocaloStyle);
      textoNode.textContent = state.nombre;
      lowerThird.classList.toggle('visible', show);
    }

    async function loadInitialState() {
      try {
        const response = await fetch(HTTP_URL);
        const payload = await response.json();
        state.nombre = payload.zocalo?.nombre || '';
        state.visible = Boolean(payload.visibility?.text ?? true);
        state.zocaloVisible = Boolean(payload.visibility?.zocalo ?? true);
        state.zocaloStyle = normalizeStyle(payload.zocaloStyle);
        render();
      } catch (error) {
        console.error('Unable to load initial state', error);
      }
    }

    function connect() {
      const socket = new WebSocket(WS_URL);

      socket.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);

        if (message.type === 'STATE_SYNC') {
          state.nombre = message.payload.zocalo?.nombre || '';
          state.visible = Boolean(message.payload.visibility?.text ?? state.visible);
          state.zocaloVisible = Boolean(message.payload.visibility?.zocalo ?? state.zocaloVisible);
          state.zocaloStyle = normalizeStyle(message.payload.zocaloStyle);
          render();
        }

        if (message.type === 'ZOCALO') {
          state.nombre = message.payload.nombre || '';
          render();
        }

        if (message.type === 'TEXT_VISIBILITY') {
          state.visible = Boolean(message.payload.visible);
          render();
        }

        if (message.type === 'TEXT_LAYER_VISIBILITY' && message.payload.layer === 'zocalo') {
          state.zocaloVisible = Boolean(message.payload.visible);
          render();
        }

        if (message.type === 'ZOCALO_STYLE') {
          state.zocaloStyle = normalizeStyle(message.payload);
          render();
        }
      });

      socket.addEventListener('close', () => {
        setTimeout(connect, 2000);
      });
    }

    loadInitialState();
    connect();
  </script>
</body>
</html>
