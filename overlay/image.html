<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Image Source</title>
  <style>
    html,
    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .image-shell {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 260ms ease, transform 360ms ease;
      pointer-events: none;
    }

    .image-shell.visible {
      opacity: 1;
      transform: scale(1);
    }

    .image-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(14, 165, 233, 0.12), transparent 36%),
        linear-gradient(180deg, rgba(2, 6, 23, 0.12), rgba(2, 6, 23, 0.32));
    }

    .image-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 24px 80px rgba(15, 23, 42, 0.42));
      transform-origin: center center;
      transition: transform 120ms linear;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="imageShell" class="image-shell">
      <div class="image-viewport">
        <img id="imageNode" alt="OBS image source">
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('apiBase') || window.location.origin).replace(/\/$/, '');
    const wsBase = (params.get('wsBase') || `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`).replace(/\/$/, '');
    const HTTP_URL = `${apiBase}/state`;
    const WS_URL = wsBase;
    const imageShell = document.getElementById('imageShell');
    const imageNode = document.getElementById('imageNode');
    const state = {
      selectedImage: null,
      selectedImageTransform: { scale: 1, x: 0, y: 0 },
      visibility: { image: false }
    };

    function normalizeTransform(transform) {
      return {
        scale: Number.isFinite(Number(transform?.scale)) ? Number(transform.scale) : 1,
        x: Number.isFinite(Number(transform?.x)) ? Number(transform.x) : 0,
        y: Number.isFinite(Number(transform?.y)) ? Number(transform.y) : 0
      };
    }

    function render() {
      if (!state) {
        return;
      }

      const selectedImage = state.selectedImage || null;
      const visible = Boolean(state.visibility && state.visibility.image && selectedImage && selectedImage.url);

      if (selectedImage && selectedImage.url) {
        imageNode.src = selectedImage.url;
      } else {
        imageNode.removeAttribute('src');
      }

      const transform = normalizeTransform(state.selectedImageTransform);
      imageNode.style.transform = `translate3d(${transform.x}px, ${transform.y}px, 0) scale(${transform.scale})`;

      imageShell.classList.toggle('visible', visible);
    }

    async function loadInitialState() {
      try {
        const response = await fetch(HTTP_URL);
        const payload = await response.json();
        state.selectedImage = payload.selectedImage || null;
        state.selectedImageTransform = normalizeTransform(payload.selectedImageTransform);
        state.visibility = payload.visibility || state.visibility;
        render();
      } catch (error) {
        console.error('Unable to load initial state', error);
      }
    }

    function connect() {
      const socket = new WebSocket(WS_URL);

      socket.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);

        if (message.type === 'STATE_SYNC') {
          state.selectedImage = message.payload.selectedImage || null;
          state.selectedImageTransform = normalizeTransform(message.payload.selectedImageTransform);
          state.visibility = message.payload.visibility || state.visibility;
          render();
        }

        if (message.type === 'SHOW_IMAGE') {
          state.selectedImage = message.payload;
          render();
        }

        if (message.type === 'IMAGE_TRANSFORM') {
          if (!state.selectedImage || message.payload.imageId === state.selectedImage.id) {
            state.selectedImageTransform = normalizeTransform(message.payload.transform);
            render();
          }
        }

        if (message.type === 'IMAGE_VISIBILITY') {
          state.visibility.image = Boolean(message.payload.visible);
          render();
        }
      });

      socket.addEventListener('close', () => {
        setTimeout(connect, 2000);
      });

      socket.addEventListener('error', () => {
        socket.close();
      });
    }

    loadInitialState();
    connect();
  </script>
</body>
</html>
